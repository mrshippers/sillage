[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: react-router handles client-side routes, so every path
# must serve index.html rather than 404 on Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never let a browser hold a stale index.html. The HTML is tiny and always
# points at content-hashed assets, so it must be revalidated every load,
# otherwise visitors get pinned to an old build's bundle.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, no-cache, must-revalidate"

# Hashed assets are immutable, cache them hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
